<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&C Generator - Welojets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e9ecff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-subtext {
            color: #999;
            font-size: 12px;
        }

        #pdf-input {
            display: none;
        }

        .file-name {
            color: #10b981;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .entity-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .radio-option {
            position: relative;
        }

        .radio-option input {
            display: none;
        }

        .radio-label {
            display: block;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 13px;
        }

        .radio-option input:checked + .radio-label {
            border-color: #667eea;
            background: #f0f2ff;
            color: #667eea;
        }

        .progress-section {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: progress 1.5s infinite;
        }

        @keyframes progress {
            0% { width: 0; }
            50% { width: 100%; }
            100% { width: 0; }
        }

        .progress-text {
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .info-box {
            background: #f0f2ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
            margin-top: 20px;
        }

        .error {
            background: #fee;
            border-left: 4px solid #f00;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 22px;
            }

            .entity-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>T&C Generator</h1>
        <p class="subtitle">Procesa contratos de operadores de aviación</p>

        <form id="tc-form" enctype="multipart/form-data">
            <!-- Upload PDF -->
            <div class="form-group">
                <label>1. Carga tu PDF</label>
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">Arrastra un PDF aquí</div>
                    <div class="upload-subtext">o haz clic para seleccionar</div>
                </div>
                <input type="file" id="pdf-input" accept=".pdf" required>
                <div class="file-name" id="file-name"></div>
            </div>

            <!-- Entity Selection -->
            <div class="form-group">
                <label>2. Selecciona entidad Welojets</label>
                <div class="entity-group">
                    <div class="radio-option">
                        <input type="radio" id="entity-sl" name="entity" value="SL" checked>
                        <label for="entity-sl" class="radio-label">
                            <div>🇪🇸 SL</div>
                            <div style="font-size: 11px; margin-top: 4px;">Madrid, España</div>
                        </label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="entity-llc" name="entity" value="LLC">
                        <label for="entity-llc" class="radio-label">
                            <div>🇺🇸 LLC</div>
                            <div style="font-size: 11px; margin-top: 4px;">Coral Gables, FL</div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-section" id="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-text">Procesando...</div>
            </div>

            <!-- Error -->
            <div class="error" id="error-message"></div>

            <!-- Submit Button -->
            <button type="submit" id="submit-btn">Procesar y descargar PDF</button>

            <!-- Info -->
            <div class="info-box">
                ✓ Se extraen automáticamente los Términos y Condiciones<br>
                ✓ Se aplican todas las transformaciones según las reglas de Welojets<br>
                ✓ Se agrega el encabezado con logo en cada página
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('tc-form');
        const uploadArea = document.getElementById('upload-area');
        const pdfInput = document.getElementById('pdf-input');
        const fileName = document.getElementById('file-name');
        const progressSection = document.getElementById('progress-section');
        const errorDiv = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        // Upload area click
        uploadArea.addEventListener('click', () => pdfInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                pdfInput.files = files;
                updateFileName();
            }
        });

        // File input change
        pdfInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (pdfInput.files.length > 0) {
                fileName.textContent = '✓ ' + pdfInput.files[0].name;
            }
        }

        // Form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.remove('show');

            if (!pdfInput.files.length) {
                showError('Por favor selecciona un PDF');
                return;
            }

            const formData = new FormData();
            formData.append('pdf', pdfInput.files[0]);
            formData.append('entity', document.querySelector('input[name="entity"]:checked').value);

            submitBtn.disabled = true;
            progressSection.style.display = 'block';

            try {
                const response = await fetch('/api/process-pdf-download', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Error procesando PDF');
                }

                // Descargar archivo
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `TC_Modified_${new Date().toISOString().slice(0, 10)}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                progressSection.style.display = 'none';
            }
        });

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
